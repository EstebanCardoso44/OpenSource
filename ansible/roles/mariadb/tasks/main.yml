---
- name: Installer MariaDB et dépendances Python
  apt:
    name:
      - mariadb-server
      - python3-pymysql
    state: present
    update_cache: yes
  become: yes

- name: S'assurer que MariaDB est démarré
  service:
    name: mariadb
    state: started
    enabled: yes
  become: yes

- name: Créer la base de données applicative
  mysql_db:
    name: "{{ app_db_name }}"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  become: yes

- name: Créer l'utilisateur applicatif MariaDB
  mysql_user:
    name: "{{ app_db_user }}"
    password: "{{ app_db_password }}"
    priv: "{{ app_db_name }}.*:ALL"
    host: "%"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  become: yes

- name: Autoriser MariaDB à écouter sur toutes les interfaces
  lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^bind-address'
    line: 'bind-address = 0.0.0.0'
  become: yes
  notify: Restart mariadb
